name: newstore_ordering_app
description: A Flutter application for generating orders by analyzing quantities on hand and utilizing reorder rules.
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  provider: ^6.0.0
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  csv: ^6.0.0
  url_launcher: ^6.2.5
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/PLU.csv